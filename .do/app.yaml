name: infinit-track-staging
region: sgp1

services:
  - name: api
    github:
      repo: <your-github-username>/Infinit_Track_BE
      branch: master
      deploy_on_push: true
    
    build_command: npm install
    run_command: npm run migrate && npm start
    
    environment_slug: node-js
    
    instance_count: 1
    instance_size_slug: basic-xxs
    
    http_port: 3000
    
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    
    envs:
      # Node Environment
      - key: NODE_ENV
        value: "production"
        scope: RUN_TIME
        type: GENERAL
      
      # Server Configuration
      - key: PORT
        value: "3000"
        scope: RUN_TIME
        type: GENERAL
      
      - key: TZ
        value: "Asia/Jakarta"
        scope: RUN_TIME
        type: GENERAL
      
      - key: LOG_LEVEL
        value: "info"
        scope: RUN_TIME
        type: GENERAL
      
      # CORS Configuration
      - key: CORS_ORIGIN
        value: "${APP_URL}"
        scope: RUN_TIME
        type: GENERAL
      
      # Database Configuration (Set via DO Console - Environment Variables)
      - key: DB_HOST
        scope: RUN_TIME
        type: SECRET
      
      - key: DB_NAME
        scope: RUN_TIME
        type: SECRET
      
      - key: DB_USER
        scope: RUN_TIME
        type: SECRET
      
      - key: DB_PASS
        scope: RUN_TIME
        type: SECRET
      
      # JWT Configuration (Set via DO Console - Environment Variables)
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      
      - key: JWT_TTL_SECONDS
        value: "86400"
        scope: RUN_TIME
        type: GENERAL
      
      # Geofence Configuration (from business flow requirements)
      - key: GEOFENCE_RADIUS_DEFAULT_M
        value: "100"
        scope: RUN_TIME
        type: GENERAL
      
      # Auto Checkout Configuration (from business flow requirements)
      - key: AUTO_CHECKOUT_IDLE_MIN
        value: "10"
        scope: RUN_TIME
        type: GENERAL
      
      - key: AUTO_CHECKOUT_TBUFFER_MIN
        value: "30"
        scope: RUN_TIME
        type: GENERAL
      
      # Optional: Geoapify Key (if needed)
      - key: GEOAPIFY_KEY
        scope: RUN_TIME
        type: SECRET
      
      # Media storage: DigitalOcean Spaces is the primary upload target.
      - key: SPACES_ENDPOINT
        value: sgp1.digitaloceanspaces.com
        scope: RUN_TIME
        type: GENERAL

      - key: SPACES_REGION
        value: sgp1
        scope: RUN_TIME
        type: GENERAL

      - key: SPACES_BUCKET
        value: infinite-track-staging-sgp1
        scope: RUN_TIME
        type: GENERAL

      - key: SPACES_ACCESS_KEY_ID
        scope: RUN_TIME
        type: SECRET

      - key: SPACES_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET

      # Transitional legacy cleanup only: used when deleting old Cloudinary assets referenced by public_id.
      - key: CLOUDINARY_CLOUD_NAME
        scope: RUN_TIME
        type: SECRET

      - key: CLOUDINARY_API_KEY
        scope: RUN_TIME
        type: SECRET

      - key: CLOUDINARY_API_SECRET
        scope: RUN_TIME
        type: SECRET

