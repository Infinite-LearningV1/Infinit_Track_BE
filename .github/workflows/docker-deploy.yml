name: Build, Push & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  DOCKER_IMAGE: registry.digitalocean.com/infinit-track/infinit-track-backend

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_ci
          DB_HOST: localhost
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASS: test_pass

  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      - name: Login to DOCR
        run: doctl registry login --expiry-seconds 1200
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Publish both immutable SHA tags and latest; droplet runtime should pin SHA explicitly.
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: production
      url: https://api.your-domain.com
    steps:
      - uses: actions/checkout@v4
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Deploy to K8s
        run: |
          kubectl set image deployment/infinit-track-app \
            app=${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            -n infinit-track
          kubectl rollout status deployment/infinit-track-app \
            -n infinit-track --timeout=300s
      - name: Verify deployment
        run: |
          kubectl get pods -n infinit-track
          kubectl get svc -n infinit-track
