services:
  app:
    image: ${BACKEND_IMAGE:-infinit-track-backend}:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: .
      target: production
      network: host
    container_name: infinit-track-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - ${BACKEND_ENV_FILE:-./deploy/env/backend.production.env}
    environment:
      NODE_ENV: production
      PORT: 3005
      TZ: Asia/Jakarta
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3005/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  app_logs:
