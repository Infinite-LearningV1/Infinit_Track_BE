services:
  db:
    image: mysql:8.0
    container_name: infinit-track-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-v1_infinite_track}
      MYSQL_USER: ${DB_USER:-trackuser}
      MYSQL_PASSWORD: ${DB_PASS:-trackpassword}
      TZ: Asia/Jakarta
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u\"$$MYSQL_USER\" -p\"$$MYSQL_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    image: registry.digitalocean.com/infinit-track/infinit-track-backend:${BACKEND_IMAGE_TAG:-latest}
    container_name: infinit-track-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      BACKEND_IMAGE_TAG: ${BACKEND_IMAGE_TAG:-latest}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-trackuser}
      DB_PASS: ${DB_PASS:-trackpassword}
      DB_NAME: ${DB_NAME:-v1_infinite_track}
      DB_SSL: ${DB_SSL:-false}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-true}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-14400}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      JWT_REFRESH_INACTIVITY_WINDOW_SECONDS: ${JWT_REFRESH_INACTIVITY_WINDOW_SECONDS:-172800}
      TZ: ${TZ:-Asia/Jakarta}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SPACES_ENDPOINT: ${SPACES_ENDPOINT:-}
      SPACES_REGION: ${SPACES_REGION:-}
      SPACES_BUCKET: ${SPACES_BUCKET:-}
      SPACES_ACCESS_KEY_ID: ${SPACES_ACCESS_KEY_ID:-}
      SPACES_SECRET_ACCESS_KEY: ${SPACES_SECRET_ACCESS_KEY:-}
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY:-}
      GEOFENCE_RADIUS_DEFAULT_M: ${GEOFENCE_RADIUS_DEFAULT_M:-100}
      AUTO_CHECKOUT_IDLE_MIN: ${AUTO_CHECKOUT_IDLE_MIN:-10}
      AUTO_CHECKOUT_TBUFFER_MIN: ${AUTO_CHECKOUT_TBUFFER_MIN:-30}
      LATE_CHECKOUT_TOLERANCE_MIN: ${LATE_CHECKOUT_TOLERANCE_MIN:-15}
      DEFAULT_SHIFT_END: ${DEFAULT_SHIFT_END:-17:00}
      AHP_CR_THRESHOLD: ${AHP_CR_THRESHOLD:-0.10}
    entrypoint:
      - sh
      - -c
      - |
        if [ "$$DB_HOST" = "localhost" ] || [ "$$DB_HOST" = "127.0.0.1" ]; then
          export DB_HOST=host.docker.internal
        fi
        exec "$$@"
      - --
    command:
      - dumb-init
      - node
      - src/server.js
    volumes:
      - app_logs:/app/logs

volumes:
  mysql_data:
  app_logs:
